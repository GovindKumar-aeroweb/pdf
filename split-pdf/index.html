<body>

<header>
  <div class="wrap head">
    <a class="brand" href="/">
      <img  src="/logo1.png" alt="AeroWebAI Logo" class="mark-logo"  background="#fff"  padding="4px" width="44px" height="44px"  border-radius="12px"   object-fit="contain" box-shadow="0 10px 20px rgba(0,0,0,.15)">
      <div>AerowebAi</div>
     
    </a>

    <nav>
      <a href="/image-to-pdf/">Image→PDF</a>
      <a href="/image-compressor/">Compress</a>
      <a href="/merge-pdf/">Merge</a>
      <a href="/remove-pdf-password/">Unlock</a>
    </nav>
  </div>
</header>

<main class="wrap">

<!-- Hero -->
<section class="hero">
  <h1>Split PDF Online</h1>
  <p>Extract pages or split PDF by range. 100% free and private.</p>
</section>

<!-- Upload -->
<section class="box">
  <input type="file" id="fileInput" accept="application/pdf" />

  <p style="font-weight:800;margin-bottom:12px">
    Upload your PDF
  </p>

  <label class="upload-btn" for="fileInput">
    <span class="material-icons">upload_file</span>
    Select PDF
  </label>
</section>

<!-- Controls -->
<section class="controls" id="controls">

  <p id="meta" style="font-weight:700"></p>

  <label>Page Range</label>
  <input id="range" type="text" placeholder="Example: 1-3,5,7-9" />

  <div class="note">
    Use commas and hyphens. Example: 1-3,5,8-10
  </div>

  <button id="splitBtn" class="upload-btn" style="margin-top:16px;width:100%">
    <span class="material-icons">call_split</span>
    Split PDF
  </button>

</section>

<!-- Result -->
<section class="result" id="result">
  <h3>PDF Split Successfully ✅</h3>

  <p id="stats"></p>

  <a id="downloadBtn" class="download" download>
    <span class="material-icons">download</span>
    Download PDF
  </a>
</section>

<footer>
  © <span id="y"></span> AeroWebAI · aerowebai.in
</footer>

</main>

<script>
document.getElementById("y").textContent=new Date().getFullYear();

const input=document.getElementById("fileInput");
const controls=document.getElementById("controls");
const splitBtn=document.getElementById("splitBtn");
const result=document.getElementById("result");
const stats=document.getElementById("stats");
const download=document.getElementById("downloadBtn");
const meta=document.getElementById("meta");
const rangeInput=document.getElementById("range");

let file=null;

/* File select */
input.addEventListener("change",e=>{
  file=e.target.files[0];
  if(file){
    controls.style.display="block";
    result.style.display="none";
    meta.textContent=`Selected: ${file.name} (${(file.size/1024/1024).toFixed(2)} MB)`;
  }
});

/* Parse ranges */
function parseRange(str,max){
  let pages=new Set();

  str.split(",").forEach(part=>{
    part=part.trim();

    if(part.includes("-")){
      let [a,b]=part.split("-").map(Number);
      if(!a||!b) return;

      for(let i=a;i<=b;i++){
        if(i>=1 && i<=max) pages.add(i);
      }

    }else{
      let n=Number(part);
      if(n>=1 && n<=max) pages.add(n);
    }
  });

  return [...pages].sort((a,b)=>a-b);
}

/* Split */
splitBtn.addEventListener("click",async()=>{

  if(!file) return;

  const range=rangeInput.value.trim();

  if(!range){
    alert("Please enter page range");
    return;
  }

  try{

    const buf=await file.arrayBuffer();
    const src=await PDFLib.PDFDocument.load(buf);

    const total=src.getPageCount();

    const pages=parseRange(range,total);

    if(pages.length===0){
      alert("Invalid page range");
      return;
    }

    const out=await PDFLib.PDFDocument.create();

    const copied=await out.copyPages(
      src,
      pages.map(p=>p-1)
    );

    copied.forEach(p=>out.addPage(p));

    const bytes=await out.save();

    const blob=new Blob([bytes],{type:"application/pdf"});
    const url=URL.createObjectURL(blob);

    download.href=url;
    download.download="split-"+file.name;

    stats.innerHTML=`
      Total pages: <b>${total}</b><br>
      Extracted: <b>${pages.join(", ")}</b>
    `;

    result.style.display="block";

  }catch(err){
    console.error(err);
    alert("Failed to split PDF");
  }

});
</script>
